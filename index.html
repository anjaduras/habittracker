<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>ANJA'S HABIT TRACKER</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel=I"icon" href="icons/icon-192.png">
</head>

<body>
    <header>
        <h1>ANJA'S HABIT TRACKER</h1>
        <div class="topStats">
            <div class="card">
                <span>POINTS:</span>
                <h2 id="points">0 ⭐</h2>
            </div>
            <div class="card">
                <span>PROGRESS</span>
                <h2 id="overallProgress">0%</h2>
            </div>
            <div class="card">
                <span>HABITS</span>
                <h2 id="habitCount">0</h2>
            </div>
        </div>
    </header>
    <section class="controls">
        <input id="habitInput" type="text" placeholder="wanna start something new?;))">
        <button id="addHabit">
            + ADD
        </button>
        <button id="toggleTheme">
            🌙 
        </button>
    </section>
    <section id="habitContainer">
        <!-- Habits generated here -->
    </section>
    <section class="rewardSection">
        <h2>🎁 REWARDS</h2>
        <div class="rewardInput">
           
        </div>
    </section>
    <footer>
        <p>
            Anja © 2026 | All rights reserved
        </p>
    </footer>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</body>

</html>
